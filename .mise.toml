[tools]
pre-commit = "latest"
python = "3.13"
uv = "latest"
trivy = "0.69.3"
ruff = "latest"
k3d = "latest"
kubectl = "latest"
k9s = "latest"
gh = "latest"
flux2 = "latest"

[settings]
python.uv_venv_auto = true
idiomatic_version_file_enable_tools = ["python"]
experimental = true

[env]
APP_REPO = 'study-tracker'
GITOPS_REPO = 'study-tracker-gitops'

[hooks]
enter = """
mise install
mise reshim
git config --global push.autoSetupRemote true
git config --global --add safe.directory /workspaces/study-tracker
mise exec -- pip install --user pipx
mise exec -- pipx install commitizen
mise exec -- pre-commit install
mise exec -- pre-commit install --hook-type commit-msg
"""

[tasks.k8s-setup-local]
description = "Set up a Kubernetes cluster that builds the local images and applies them"
run = "bash ./kubernetes/setup_cluster_local"

[tasks.e2e-test]
description = "Run end-to-end tests on the Kubernetes deployment"
run = "cd ./e2e/ && uv run e2e-test.py"

[tasks.setup-keys]
description = "Set up deploy keys for our repo"
run = "bash ./scripts/setup_deploy_key"

[tasks.k8s-setup-gitops]
description = "Set up a cluster configured with GitOps using Flux"
run = "bash ./scripts/setup_cluster_gitops"
